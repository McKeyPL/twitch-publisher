# Paths may be overridden by CLI options added by future stages.
paths:
  recordings_root: '${RECORDINGS_ROOT:-E:\TwitchRecordings}'
  ffprobe: ffprobe
  database: data/upload_state.sqlite3
  log_directory: logs
  auth_directory: auth

watcher:
  poll_interval_seconds: 30
  # The second MKV size sample must occur at least this many seconds later.
  size_stability_seconds: 60

platforms:
  youtube:
    enabled: true
    # An empty value is allowed only when enabled=false; config.py validates it.
    client_secrets_file: ${YOUTUBE_CLIENT_SECRETS_FILE:-}
    token_file: auth/youtube_token.json
    privacy_status: unlisted
    max_duration_hours: 12
    title_limit: 100
    category_id: "20" # Gaming
    captions_language: pl
    captions_name: "Twitch Chat"
    # Granular videos.insert bucket: default 100 calls/day at 1 unit per call.
    daily_upload_limit: 100
    daily_quota_units: 10000
    # These are local counters; Google Cloud Console remains authoritative.
    upload_quota_units: 1
    captions_quota_units: 400
    srt_max_size_mb: 100
    playlists:
      mrozopl: ${YT_PLAYLIST_MROZOPL:-}
      jellysketch: ${YT_PLAYLIST_JELLYSKETCH:-}
      ctsg: ${YT_PLAYLIST_CTSG:-}
      jalowy_gracz: ${YT_PLAYLIST_JALOWY_GRACZ:-}
      perrydotto: ${YT_PLAYLIST_PERRYDOTTO:-}
      buvanybu: ${YT_PLAYLIST_BUVANYBU:-}

  cda:
    enabled: true
    # Local-file upload form, confirmed in an authenticated session.
    upload_url: https://www.cda.pl/uploader_video
    storage_state_file: auth/cda_state.json
    # TODO: manually verify the current title and video-duration limits.
    title_limit: null
    max_duration_hours: null
    # Defaults: public video, all content declarations set to No,
    # terms and ownership statement accepted.
    form_options:
      private: false
      accept_terms: true
      confirm_rights: true
      contains_violence: false
      contains_sex: false
      contains_addiction: false
      contains_profanity: false
      contains_sponsorship: false

  rumble:
    enabled: true
    upload_url: https://rumble.com/upload.php
    storage_state_file: auth/rumble_state.json
    # TODO: manually verify the current title and video-duration limits.
    title_limit: null
    max_duration_hours: null
    # HAR captured on 2026-07-20: category required, file size limited to 15 GB.
    primary_category: Gaming
    max_file_size_gb: 15
    # Required rights choice: 0=Personal Use, 5=exclusive,
    # 6=Rumble Only (non-exclusive), 7=excluding YouTube.
    # Empty means Rumble returns a clear error before file transfer.
    license_option: ${RUMBLE_LICENSE_OPTION:-}

browser:
  # Optional. Empty lets browser_cookie3 locate the default Firefox profile.
  firefox_profile_path: ${FIREFOX_PROFILE_PATH:-}
  headless: true
  interactive_login_headless: false
  # Overridden by the --browser-debug CLI option.
  debug: false
  debug_directory: logs/browser_debug
  debug_screenshot_interval_seconds: 300

metadata:
  title_template: '{clean_title} | {channel} | {date_YYYY-MM-DD}'
  remove_bang_tags: true

retry:
  max_attempts: 3
  initial_backoff_seconds: 5
  multiplier: 2
  max_backoff_seconds: 60

moving:
  uploaded_directory_name: _uploaded

cleanup:
  retention_days: 30
  dry_run: true

logging:
  level: INFO
  console_colors: true
  file_name: twitch_publisher.log
