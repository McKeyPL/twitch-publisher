name: Tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  python-tests:
    name: ${{ matrix.os }} / Python ${{ matrix.python }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
        python:
          - "3.11"
          - "3.12"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip

      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -r requirements-dev.txt

      - name: Run tests
        run: python -m pytest -v

      - name: Compile Python sources
        run: python -m compileall -q .

  linux-scripts:
    name: Validate Linux scripts
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate Bash syntax
        run: |
          bash -n install.sh
          bash -n start.sh

      - name: Test installer help
        run: ./install.sh --help

      - name: Test launcher help
        run: ./start.sh --help

      - name: Test installer without system changes
        run: ./install.sh --skip-system --skip-browsers --with-dev
